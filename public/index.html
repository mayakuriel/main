<!doctype html>
<html lang="he">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Company Info Finder</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>מערכת מידע על חברות</h1>
      <p>תן שם חברה ותקבל תחום פעילות, מידע כללי וכתבות אחרונות.</p>

      <section class="search-box">
        <label for="companyName">שם חברה</label>
        <div class="row">
          <input id="companyName" placeholder="לדוגמה: Stripe" />
          <button id="fetchButton" type="button">חפש</button>
        </div>
      </section>

      <p id="statusText" class="status hidden">טוען מידע...</p>
      <p id="errorText" class="error hidden"></p>

      <section id="result" class="hidden"></section>
    </main>

    <script src="/app.js" defer></script>
  </body>
</html>
